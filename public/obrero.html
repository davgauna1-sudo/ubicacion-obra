<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Marcar asistencia · Obra</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #0f172a; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f8fafc; display: flex; flex-direction: column; }
    header { background: #0f172a; color: #fff; padding: 18px 20px; }
    header .obra { font-size: 19px; font-weight: 700; }
    header .meta { font-size: 13px; color: #94a3b8; margin-top: 4px; }
    #mapa { height: 300px; }
    .cuerpo { padding: 20px; flex: 1; }
    .estado-card { background: #fff; border-radius: 14px; padding: 18px; border: 1px solid #e2e8f0; text-align: center; margin-bottom: 16px; }
    .estado-pill { display: inline-block; padding: 6px 16px; border-radius: 99px; font-weight: 700; font-size: 14px; }
    .pill-fuera { background: #fee2e2; color: #991b1b; }
    .pill-dentro { background: #dcfce7; color: #166534; }
    .instruccion { color: #475569; font-size: 14px; margin: 14px 0; }
    .btn { width: 100%; border: none; border-radius: 14px; padding: 18px; font-size: 18px; font-weight: 700; color: #fff; cursor: pointer; }
    .btn-entrada { background: #16a34a; }
    .btn-salida { background: #ea580c; }
    .btn:disabled { opacity: .5; }
    .historial { background: #fff; border-radius: 14px; padding: 16px; border: 1px solid #e2e8f0; }
    .historial h3 { font-size: 14px; margin-bottom: 10px; color: #334155; }
    .reg { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .reg:last-child { border: none; }
    .tag { font-weight: 600; }
    .tag.e { color: #16a34a; } .tag.s { color: #ea580c; }
    .aviso { text-align: center; padding: 60px 20px; color: #64748b; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #0f172a; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transition: opacity .3s; z-index: 9999; }
    .toast.show { opacity: 1; }
    .leaflet-container { font: inherit; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="aviso">Cargando…</div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/js/obrero.js"></script>
</body>
</html>
